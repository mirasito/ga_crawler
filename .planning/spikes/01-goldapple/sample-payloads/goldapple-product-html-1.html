    <script type="text/javascript">
      function isAccepted() {
        // Если домен содержит 'by', то куки должны быть приняты
        var shouldBeAccepted = window.location.host.indexOf('by') > 0
        if (shouldBeAccepted) {
          var cookies = document.cookie.split(';')
          var name = 'is-accepted-cookies'
          for (var i = 0; i < cookies.length; i++) {
            var cookie = cookies[i].replace(/^\s+|\s+$/g, '')
            if (cookie.indexOf(name + '=') === 0) {
              return cookie.substring(name.length + 1) === 'true'
            }
          }
          return false
        } else {
          // Если домен не содержит 'by', то куки не принимаются
          return true
        }
      }
      // Проверяем, принял ли пользователь куки
      var isAcceptedCookies = isAccepted()
    </script>
