# Mapping from viled.brand_norm → goldapple.kz brand slug.
#
# Default rule (when a brand_norm is NOT in `overrides`):
#   slug = re.sub(r'[_\s]+', '-', brand_norm.lower()).strip('-')
#
# `brand_norm` is the value stored on snapshots.brand_norm after the
# Phase 2 normalizer; `slug` is the kebab-case segment that
# https://goldapple.kz/brands/{slug} accepts.
#
# Empirically verified via probe sequence in inbox/ga_brand_xhr/,
# inbox/ga_cards_api/, inbox/ga_brand_slugs_from_pdps.json. When you
# add a new brand to viled and the default rule fails, run
# `scripts/extract_brand_slugs_from_pdps.py` against a known PDP for
# that brand and add the discovered slug here.

overrides:
  # === Confirmed via brand-page badge / PDP-breadcrumb extraction ===
  armani_beauty: armani            # was giorgio-armani; both work; armani is canonical
  bobbi-brown: bobbi-brown         # default kebab — explicit for clarity
  clinique: clinique               # default — works
  estee_lauder: estee-lauder       # default kebab — explicit
  givenchy-beauty: givenchy        # GA drops "beauty" suffix
  kiehls: kiehl-s                  # apostrophe stripped to hyphen; PDP breadcrumb confirmed
  lancome: lancome                 # default kebab — works
  la_mer: la-mer                   # default kebab
  la-sultane-de-saba: la-sultane-de-saba
  mac: mac                         # default kebab — works (badge=176)
  saint_laurent: yves-saint-laurent  # GA expands "Saint Laurent" → "Yves Saint Laurent"
  tom_ford: tom-ford               # default kebab — works (badge=133)
  frederic_malle: frederic-malle   # default kebab works (PDP breadcrumb confirmed)
  biotherm: biotherm               # default kebab; PDP breadcrumb confirmed

  # === Resolved 2026-05-16 via /front/api/brands authoritative index ===
  # The /brands page calls /front/api/brands?locale=ru once and returns
  # all 1389 brands with canonical slugs. Captured via
  # scripts/probe_ga_brands_index_v2.py + scripts/resolve_unmatched_brands_v2.py.
  # Default-kebab failure mode for these brands is the "-beauty" /
  # "-perfume" suffix that viled appends but GA omits.
  carolina-herrera-beauty: carolina-herrera
  courreges-perfume: courreges
  gucci-beauty: gucci
  hugo-boss-beauty: hugo-boss
  kenzo-beauty: kenzo
  lanvin-beauty: lanvin
  valentino-beauty: valentino
  dr-vranjes: dr-vranjes-firenze   # GA uses full marca name

  # === Other brand_norms that default-kebab handles ===
  # (listed for documentation; YAML lookup falls through to default when omitted)
  clarins: clarins
  byredo: byredo
  creed: creed
  zielinski_rozen: zielinski-rozen
  darphin: darphin
  paco-rabanne: paco-rabanne
  dr-jart: dr-jart
  oribe: oribe
  davines: davines
  azzaro: azzaro
  chloe: chloe
  memo_paris: memo-paris
  kilian_paris: kilian-paris
  maison_francis_kurkdjian: maison-francis-kurkdjian

  # === Brands genuinely absent from GA's /front/api/brands index ===
  # Verified 2026-05-16: scripts/resolve_unmatched_brands_v2.py searched
  # the full 1389-brand authoritative index from /front/api/brands. The
  # brand_norms below produced ZERO substring/normalized-label hits — GA
  # does not stock them at all on the KZ storefront. No further slug
  # archaeology will help; viled has no comparator price.
  #
  #   affinessence, aj-arabia, amouage, aveda, clive-christian,
  #   ex_nihilo, jo_malone_london, margys, marly, nescens,
  #   roja-parfums (closest GA hit "OJAR" is a different house),
  #   starskin, aura-of-kazakhstan (GA "Aura" is a different brand)
