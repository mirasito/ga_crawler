 обстоятельств, произошедших не по вине Продавца.","deliveryAgreementThree":"Срок исполнения Заказа в исключительных случаях может быть оговорен с Покупателем индивидуально в зависимости от характеристик и количества заказанного Товара. В случае отсутствия части Заказа на складе Продавца, в том числе по причинам, не зависящим от последнего, Продавец вправе аннулировать указанный Товар из Заказа Покупателя. Продавец обязуется уведомить Покупателя об изменении комплектности его Заказа путем направления сообщения на электронный адрес, указанный при регистрации на интернет-сайте, или при непосредственном получении Заказа Покупателем. В таком случае возврат Продавцом уплаченных Покупателем денежных средств происходит тем же способом, каким была произведена оплата.","deliveryAgreementFour":"При доставке Заказ вручается Покупателю либо третьему лицу, указанному в Заказе в качестве получателя (далее Покупатель и третье лицо именуются «Получатель»).","deliveryAgreementFive":"Во избежание случаев мошенничества, при вручении предоплаченного Заказа лицо, осуществляющее доставку Заказа, вправе затребовать документ, удостоверяющий личность Получателя, а также указать тип и номер предоставленного Получателем документа на квитанции к Заказу. Продавец гарантирует конфиденциальность и защиту персональных данных Получателя.","deliveryAgreementSix":"Риск случайной гибели или случайного повреждения Товара переходит к Покупателю с момента фактической передачи ему Заказа. В случае недоставки Заказа Продавец возмещает Покупателю стоимость предоплаченного Покупателем Заказа и доставки в полном объеме после получения от Службы доставки подтверждения утраты Заказа.","deliveryAgreementSeven":"Стоимость доставки каждого Заказа рассчитывается индивидуально, исходя из веса Товара, региона и способа доставки, а также (в случае необходимости) формы оплаты, и указывается на сайте на последнем этапе оформления Заказа.","deliveryAgreementEight":"Обязанность Продавца передать товар Покупателю считается е 10 лет компания оказывает активное содействие программам и акциям фонда.","twentyFive":"В Южной столице открывается ювелирный и часовой бутик Van Cleef \u0026 Arpels.","twentySix":"В Алматы проходит торжественное открытие официального бутика Cartier. В нем представлены украшения, часы, аксессуары и парфюм легендарной французской марки.","twentySix2":"В Алматы состоялась закрытая презентация VILED, которая ознаменовалась первым и единственным визитом Хулио Иглесиаса в Алматы.","twentyEight":"В Астане открывается первый бутик компании – ювелирный и часовой салон VILED.","twentyEight2":"Официальный бутик Tiffany \u0026 Co распахнул свои двери для жителей Алматы. В нем представлены украшения и аксессуары марки.","twentyNine":"В Алматы состоялась закрытая презентация Cartier, которую увенчало первое и единственное выступление «королевы бурлеска» Диты фон Тиз в Казахстане.","twentyNine2":"Входная группа галереи бутиков VILED в Алматы преображается благодаря уникальному тематическому оформлению. С тех пор сезонное обновление декора входной группы стало славной традицией компании.","twentyTen":"VILED Group открывает первый и единственный в Центральной Азии сервис-центр международного уровня, не имеющий аналогов по уровню оснащенности и подготовки специалистов.","twentyTen2":"При участии компании VILED Group были созданы по специальному заказу эксклюзивные часы Van Cleef \u0026 Arpels Midnight in Almaty. Рисунок звездного неба на циферблате часов повторяет расположение звезд над Алматы.","twentyTwelve":"Компания открывает по франшизе первый в СНГ и Центральной Азии мультибрендовый универмаг Saks Fifth Avenue. В нем представлен тщательно отобранный ассортимент премиальной женской, мужской и детской одежды, аксессуаров, обуви, ювелирных изделий, парфюмерии и предметов интерьера.","twentyThirteen":"Компания VILED выступает официальным партнером конкурса «Мисс Казахстан».","twentyThirteen2":"В бутике VILED Style в Астане проходит выставка работ Ренуара, Сезанна и Ван Гога из собрания частных коллекций.","twentySixteen":"В Алматы открывается официальный бутик одного из самых роскошных в мире ювелирных брендов Graff. В бутике представлены самые известные коллекции Graff - от обручальных колец до ювелирных часов.","twentyEighteen":"Мультибрендровый ювелирно-часовой салон VILED по проспекту Назарбаева вновь открывает двери после реконструкции. В течение всего существования мультибрендовый салон предлагал своим клиентам лучший ассортимент от именитых мировых брендов и признанных современных дизайнеров.","twentyNineteen":"Открытие Viled Style в крупнейшем ТРЦ Talan Gallery: моно-бутики для женщин, мужчин и детей, ювелирный мультибренд Viled c брендами Cartier, Graff, Boucheron, Roberto Coin, Сhimento, а также бутики Chopard, Tiffany, Kiton, Loro Piana, Brunello Cucinelli, Dolce\u0026Gabbana, Valentino.","twentyTwentyTwo":"10-летие Saks Fifth Avenue в Казахстане и продление франшизы до 2032 года, что подтверждает успех бренда в регионе. За десятилетие магазин стал центром притяжения для любителей люкса, укрепив позиции Казахстана на международном luxury-рынке. Продление контракта открыло новые возможности для инвестиций и развития fashion- и ювелирно-часового сегментов.","twentyTwentyFour":"В Астане в ТРЦ Talan Gallery открылся Viled Style for Men — мультибрендовый бутик мужской одежды, новый бутик Kiton и корнер Zegna.","twentyTwentyFour2":"В Алматы в Saks Fifth Avenue состоялось открытие отдела Home\u0026Gift с брендами Christofle, Ginori, Lladro, Haviland, Daum и расширенным ассортиментом Baccarat — посуда и подарки класса люкс от ведущих мировых брендов фарфора и хрусталя.","twentyTwentyFive":"Открытие обновленного бутика Cartier по глобальному концепту  Local Touch, отражающему культуру и традиции локального рынка. В оформлении — панно со снежным барсом, символом Алматы, созвучным пантере Cartier, и Чарынский каньон в технике маркетри (marquetry). Также в Алматы и Астане открылись новые корнеры Brioni."},"item":{"sizeChart":"Таблица размер оном «О регулировании торговой деятельности» и другими нормативно-правовыми актами.","agreementsSectionFourItemThree":"4.3. Пользователь несет ответственность за достоверность и достаточность предоставленной при оформлении Заказа информации.","agreementsSectionFourItemFour":"4.4. Стороны освобождаются от ответственности за полное или частичное неисполнение своих обязательств, если неисполнение является следствием таких непреодолимых обстоятельств как: война или военные действия, землетрясение, наводнение, пожар и другие стихийные бедствия, акты или действия органов государственной власти, изменение таможенных правил, ограничения импорта и экспорта, возникших независимо от воли Сторон после заключения настоящего Договора. Сторона, которая не может исполнить свои обязательства, незамедлительно извещает об этом другую Сторону и предоставляет документы, подтверждающие наличие таких обстоятельств, выданные уполномоченными на то органами.","agreementsSectionFourItemFive":"4.5. Администрация Сайта оставляет за собой право по своему усмотрению изменять или исключать из каталога предлагаемый к продаже товар, изменять его стоимость, в любое время без предварительного уведомления Пользователя.","agreementsSectionThreeTitle":"Предмет соглашения","agreementsSectionThreeItemOne":"3.1. По настоящему Соглашению Администрация безвозмездно предоставляет Пользователю доступ к Сайту, а также к сервисам, размещенным на Сайте, а Пользователь в свою очередь обязуется использовать Сайт в соответствии с условиями настоящего Соглашения.","agreementsSectionThreeItemTwo":"3.2. Пользователь обязуется не использовать Сайт в коммерческих целях без предварительного письменного согласия Администрации.","agreementsSectionThreeItemThree":"3.3. Пользователь обязуется не использовать размещенные на Сайте результаты интеллектуальной деятельности (в том числе, но не ограничиваясь: изображения, тексты, программный код) без предварительного согласия Администрации.","agreementsSectionTwoTitle":"Общие положения","agreementsSectionTwoItemOne":"2.1. Настоящее Соглашение является публичной офертой (предложением) Администрации, содержащей существенные условия соглашения об использовании Сайта Пользователем.","agreementsSectionTwoItemTwo":"2.2. Использование Сайта, в том числе его просмотр, поиск информации, использование сервисом (далее — использование Сайта) возможно только при условии полного и безоговорочного принятия условий настоящей оферты (акцепта) в форме, установленной настоящим Соглашением.","agreementsSectionTwoItemThree":"2.3. При несогласии с условиями настоящего Соглашения Пользователь обязан немедленно прекратить использование Сайта.","agreementsSectionTwoItemFour":"2.4. Любое использование Сайта Пользователем при отсутствии заключенного между Сторонами соглашения является незаконным, Администрация не несет ответственности за последствия такого использования Сайта.","agreementsSectionTwoItemFive":"2.5. Акцептом настоящей оферты являются любые действия Пользователя по использованию Сайта:","agreementsSectionTwoItemSix":"2.5.1. выполнение регистрации с помощью формы на Сайте","agreementsSectionTwoItemSeven":"2.5.2. нажатие галочки «С условиями Публичной оферты и условиями использования ознакомлен» при регистрации на сайте.","agreementsSectionTerms":"Термины","agreementsOffer":"«Оферта» — публичное предложение Администрации Сайта, адресованное любому физическому/юридическому лицу, заключить с ним договор купли-продажи, соглашение на существующих условиях, содержащихся в настоящем Соглашении, включая все его приложения.","agreementsWebsiteAdministration":"«Администрация Сайта» — юридическое лицо ТОО «VILED FASHION», местонахождение по адресу: 050059, Республика Казахстан, г. Алматы, мкр. Самал-2, д. 67, созданное в соответствии с законодательством Республики Казахстан и осуществляющее предпринимательскую деятельность по продаже Товаров, в том числе дистанционным способом.","agreementsUsers":"«Пользователь» — физическое или юридическое лицо, заключившее с Администрацией Сайта Договор на условиях, содержащихся в настоящем Договоре.","agreementsAcceptance":"«Акцепт» — полное и безоговорочное принятие Пользователем условий Соглашения.","agreementsGoods":"«Товар» — перечень наименований ассортимента, представленный на интернет-сайте viled.kz.","agreementsWebsite":"«Сайт» – совокупность электронных документов (файлов) Администрации Сайта, доступных в сети Интернет по адресу viled.kz.","agreementsSectionOneDescr":"Настоящее Пользовательское соглашение (далее — Соглашение) заключается между VILED, именуемым в дальнейшем Администрация, и любым лицом, намеревающимся использовать и/или использующим интернет-сайт shop.viled.kz (далее — Сайт), именуемый в дальнейшем Пользователь, и определяет условия, ограничения и гарантии при использовании Сайта.","agreementsSectionOneTitle":"Термины","paymentSidebar":"Условия оплаты","paymentSubtitle":"Условия оплаты товаров","paymentTitle":"Способы оплаты покупок на Viled.kz","paymentTitleTwo":"Банковской картой","paymentText":"Оплата заказа Покупателем не является гарантией выдачи или отправки товара курьером, так как при сборке и упаковке заказа могут быть выявлены случаи брака или повреждения товара, находившегося на витрине. Продавец вправе сообщить об этом Покупателю и вернуть деньги, аннулировав заказ Покупателя. Выдача заказа на доставку или самовывоз производится после получения заказом статуса \"Подтвержден\".","paymentSectionTwo":"Вы можете оплатить покупку с помощью любой банковской картой, которой можно производить интернет-платежи. Обратите внимание на наличие возможности интернет-транзакций на вашей карте, срок действия и наличие средств. Оплата производится с помощью удобной и безопасной системы АО Народный Банк Казахстана и компании Processing.kz. После оплаты вам будет представлен чек, который можно распечатать и сохранить, а на ваш электронный адрес будет выслано уведомление об оплате.","paymentTitleThree":"Банковский перевод для юридических лиц","paymentSectionThree":"Чтобы оплатить покупку через банковский перевод, позвоните по номеру +7 701 647 12 25 и сообщите необходимую информацию для оплаты. Наш менеджер подготовит для вас счет- фактуру и отправит на указанный вами адрес. Вы можете оплатить счет-фактуру в кассе любого банка или с расчетного счета вашей компании. На следующий день после оплаты и начисления средств на наш счет мы оформим для Вас заказ и доставку. Вместе с товаром вам будет предоставлены необходимые документы о покупке.","loyaltyProgramTerms":"Информация по программе лояльности","loyaltyProgramTableAfter":"*в случае несовершения ни одной покупки, бонусы сгорают через 1 год.","card-types":"Виды карт","classic-type":"Classic","premium-type":"Premium","royal-type":"Royal","agreementTitle":"Условия пользования","loyaltyTerms":"Условия лояльности","loyalty-row-1-1":"Сумма накоплений (оборот), тенге","loyalty-row-1-2":"от 1 до 2 000 000","loyalty-row-1-3":"от 2 000 001 до 5 000 000","loyalty-row-1-4":"от 5 000 001","loyalty-row-2-1":"% начисления бонусов","loyalty-row-2-2":"5%","loyalty-row-2-3":"7%","loyalty-row-2-4":"10%","loyalty-row-3-1":"Бонусы в День рождения","loyalty-row-3-2":"Дополнительно 5%","loyalty-row-3-3":"Дополнительно 5%","loyalty-row-3-4":"Дополнительно 5%","loyalty-row-4-1":"Сгорание бонусов ","loyalty-row-4-2":"1 год","loyalty-row-4-3":"2 года","loyalty-row-4-4":"2 года","loyalty-row-5-1":"Скидка в кафе The Point","loyalty-row-5-2":"Не действует","loyalty-row-5-3":"Не действует","loyalty-row-5-4":"10%","loyalty-row-6-1":"Услуги в ателье","loyalty-row-6-2":"Не действует","loyalty-row-6-3":"Не действует","loyalty-row-6-4":"Бесплатно ","loyalty-row-7-1":"Скидка в Keruen Cinema (Астана)","loyalty-row-7-2":"Не действует","loyalty-row-7-3":"Не действует","loyalty-row-7-4":"10%","loyalty-program-title-1":"Правила начисления и списания бонусов:","loyalty-program-title-1-1":"1 бонус = 1 тенге","loyalty-program-title-1-2":"Бонусы не начисляются и не списываются на покупки товара, участвующего в специальных акциях, на который в момент покупки уже действуют скидки, а также товар брендов – исключений.","loyalty-program-title-1-3":"Бонус не начисляется и не списываются на товар при консигнации.","loyalty-program-title-1-4":"Бонусы не начисляются на услуги ателье и не подлежат обмену на деньги.","loyalty-program-title-1-5":"Бонусы становятся доступными к использованию через 14 календарных дней после даты покупки или доставки заказа.","loyalty-program-title-2":"Бренды-исключения:","loyalty-program-title-2-1":"Бонусная карта не действуют на товары брендов: Cartier, Chopard.","loyalty-program-title-3":"Подтверждение и изменение статуса:","loyalty-program-title-3-1":"Срок сохранения статуса – 1 год с момента получения.","loyalty-program-title-3-2":"Подтверждение статуса производится каждый год совершением покупок на сумму, которая необходима для получения соответствующего статуса.","loyalty-program-title-3-3":"В случае не подтверждения статуса происходит снижение на статус, соответствующий сумме покупок за текущий год.","loyalty-program-title-3-4":"Срок сохранения бонусов на бонусном счете клиента – 2 года с момента начисления, за исключением уровня Classic - при не подтверждении статуса в течение года, бонусы сгорают, статус сохраняется (карта остается активной).","loyalty-program-title-3-5":"Отслеживайте сумму покупок и состояние карты в личном кабинете.","loyalty-program-title-4":"Открытие виртуальной карт MY VILED:","loyalty-program-title-4-1":"Вы можете получить виртуальную карту, зарегистрировавшись на сайте viled.kz","paymentTitle-2":"Оплата банковской картой","paymentTitle-2-subtitle-1":"Вы можете оплатить покупку любой банковской картой, которой можно производить интернет-платежи, через безопасные сервисы:","paymentTitle-2-subtitle-1-1":"АО «Народный Банк Казахстана» (Halyk Bank)","paymentTitle-2-subtitle-1-2":"АО «Kaspi Bank» (Kaspi.kz)","paymentTitle-2-subtitle-1-3":"ТОО «Paybox.money» («Freedom Pay»)","paymentTitle-2-subtitle-2":"Процесс оплаты банковской картой в интернет-магазине Viled.kz:","paymentTitle-2-subtitle-2-1":"Войдите в свой личный кабинет интернет-магазина Viled.kz;","paymentTitle-2-subtitle-2-2":"Выберете нужный товар, размер и нажмите на кнопку «Добавить в корзину»;","paymentTitle-2-subtitle-2-3":"Перейдите в «Корзину», проверьте состав заказа и нажмите «Оформить заказ»;","paymentTitle-2-subtitle-2-4":"Сверьте Личные данные (Имя и Фамилия, и номер телефона);","paymentTitle-2-subtitle-2-5":"Выберите удобный «Метод доставки» (Доставка курьером, Самовывоз из магазина);","paymentTitle-2-subtitle-2-6":"Выберите адрес доставки или добавьте новый адрес;","paymentTitle-2-subtitle-2-7":"Далее выберите «Метод оплаты» - Оплата картой*;","paymentTitle-2-subtitle-2-8":"Выберите удобный сервис оплаты:","paymentTitle-2-subtitle-2-8-1":"Halyk Bank – для карт эмитированных Halyk Bank;","paymentTitle-2-subtitle-2-8-2":"Kaspi.kz – для карт эмитированных Kaspi.kz;","paymentTitle-2-subtitle-2-8-3":"Freedom Pay – для всех остальных карт, эмитированных в Республике Казахстан и других странах;","paymentTitle-2-subtitle-2-9":"Введите имеющийся у вас промокод и нажмите кнопку «Перейти к оплате»;","paymentTitle-2-subtitle-2-10":"В открывшемся новом окне введите данные вашей банковской карты (номер карты, фамилию и имя владельца, срок действия карты и CVV/CVC код, email и номер телефона). При выборе сервиса оплаты через Kaspi.kz на экране отобразится QR, отсканировав который Вы сможете оплатить заказ картой Kaspi Gold в мобильном приложении Kaspi.kz.","paymentTitle-2-notify":"* Обратите внимание на наличие возможности интернет-транзакций на вашей карте, срок действия и наличие средств.","paymentTitle-2-notify2":"Фискальный чек будет отправлен на ваш электронный адрес, указанный в профиле. После того как заказ перейдет в статус «Подтвержден», чек будет сохранен в деталях заказа в разделе «Мои заказы».","paymentTitle-3":"Рассрочка и кредитование","paymentTitle-3-miniTitle-1":"Вы можете оплатить покупку оформив рассрочку или кредит у наших партнеров: -text-6":"Выберите адрес доставки или добавьте новый адрес;","paymentTitle-4-text-7":"Введите имеющийся у вас промокод;","paymentTitle-4-text-8":"Далее, выберите метод оплаты «Оплата при получении*» и оформите заказ.","paymentTitle-4-notify":"* Обратите внимание, что ювелирные изделия/украшения невозможно оформить методом оплаты «Оплата при получении».","paymentTitle-4-text-9":"После оплаты вам будет представлен чек, который можно распечатать и сохранить, а на ваш электронный адрес будет выслано уведомление об оплате и состав покупки.","paymentTitle-4-miniTitle-3":"Банковский перевод для юридических лиц:","paymentTitle-4-text-10":"Чтобы оплатить покупку через банковский перевод, позвоните по номеру 7896 (Бесплатно с мобильного) или +7 701 647 12 25 (для международных звонков и WhatsApp) и сообщите необходимую информацию для оплаты. Наш менеджер подготовит для вас счет-фактуру и отправит на указанный вами адрес. Вы можете оплатить счет-фактуру в кассе любого банка или с расчетного счета вашей компании. На следующий день после оплаты и начисления средств на наш счет мы оформим для Вас заказ и доставку. Вместе с товаром вам будет предоставлены необходимые документы о покупке.","privacyTitle":"Политика конфиденциальности","privacyDesc":"Настоящая Политика конфиденциальности и обработки персональных данных (далее – «Политика конфиденциальности») является публичным Договором, заключенным между владельцем Сайта \u003ca href=https://viled.kz\u003ewww.viled.kz\u003c/a\u003e - ТОО «VILED FASHION» (далее «Viled.kz») и «Пользователем». Настоящая Политика составлена в соответствии с требованиями Закона Республики Казахстан от 21 мая 2013 года No 94-V «О персональных данных и их защите» и определяет порядок обработки персональных данных и меры по обеспечению безопасности персональных данных, и действует в отношении всей информации, которую Viled.kz может получить о Пользователе во время использования сайта.","privacySectionOneDesc":"Настоящая Политика конфиденциальности содержит
