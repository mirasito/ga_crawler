# Brand alias resolution — flat dict {brand_norm: [aliases...]} per CONTEXT D-205.
# Seeded 2026-05-07 from viled spike payloads (top-50 viled brands).
#
# Source priority (D-206):
#   1. PRIMARY: viled-fetch-results.json (15 product fetches — confirms /item/<id> probe)
#   2. SECONDARY: viled-home-brands-extract.json (52 homepage product cards across 5 sections)
#   3. TERTIARY: known luxury fashion + niche perfumery (STATE.md plan 01-05; 5-brand probe)
#
# Schema (D-205): canonical key (top-level) maps to a list of aliases.
#   - Canonical keys: lowercase + ascii (snake_case for aliased brands so test corpus
#     `estee_lauder`/`givenchy` returns underscore form; pure-Latin slug-only brands
#     do NOT need entries here — `normalize_brand` falls through to `_normalize_punct(raw)`).
#   - Aliases: original Latin spelling first, accented Latin second (when differs),
#     Cyrillic transliteration last (when commonly used in KZ market).
#
# Operator workflow: NORM-06 review queue at `.planning/runs/{run_id}/norm06-review.md`
# surfaces unmatched brands weekly — operator adds aliases via PR to this file.
# Read-once at run start (D-207); changes require next weekly run to take effect.

